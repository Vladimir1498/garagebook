services:
  postgres:
    image: postgres:16-alpine
    container_name: garagebook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garagebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garagebook_secret}
      POSTGRES_DB: ${POSTGRES_DB:-garagebook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garagebook}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garagebook-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-garagebook}:${POSTGRES_PASSWORD:-garagebook_secret}@postgres:5432/${POSTGRES_DB:-garagebook}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: garagebook-web
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: garagebook-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads_data:
