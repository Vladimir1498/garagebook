<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarageBook — Офлайн</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FAFBFC;
      color: #1a1d23;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      max-width: 400px;
      text-align: center;
      padding: 40px 32px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #3B82F6, #1D4ED8);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6B7280; line-height: 1.6; }
    .status { margin-top: 20px; padding: 12px; border-radius: 12px; background: #FEF3C7; color: #92400E; font-size: 13px; }
    .retry { margin-top: 20px; padding: 10px 24px; border: none; border-radius: 12px; background: #3B82F6; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
    .retry:hover { background: #2563EB; }
    .cached { margin-top: 16px; font-size: 12px; color: #10B981; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет подключения</h1>
    <p>Вы сейчас офлайн. Приложение показывает кэшированные данные.</p>
    <div class="status">Проверьте подключение к интернету и попробуйте снова.</div>
    <button class="retry" onclick="window.location.reload()">Попробовать снова</button>
    <p class="cached">Данные обновятся при восстановлении связи</p>
  </div>
</body>
</html>
